{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <div class="row">
    <div class="col-md-8">
      <h2>Initialisation du traitement OCR</h2>
      <p class="text-muted">Sélectionnez les images à traiter et choisissez si le LLM doit être utilisé.</p>

      <div class="card shadow-sm mt-3">
        <div class="card-body">

          <form action="{{ url_for('ocr.init_ui') }}" method="POST" enctype="multipart/form-data" class="mt-3">

            <div class="mb-3">
              <label for="files" class="form-label">Images</label>
              <input type="file" class="form-control" id="files" name="files" multiple required>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="use_llm" name="use_llm">
              <label class="form-check-label" for="use_llm">
                Activer LLM ?
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Valider</button>

          </form>

        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
